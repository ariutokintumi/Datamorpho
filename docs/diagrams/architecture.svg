<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 210"
     role="img" aria-label="Datamorpho architecture: a Datamorphed File plus a Reconstruction Object produces the Hidden State output. MorphoStorage optionally hosts Reconstruction Objects.">

  <defs>
    <linearGradient id="file-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a6e"/>
    </linearGradient>
  </defs>

  <!-- ── BLOCK 1: Datamorphed File ─────────────── -->
  <rect x="16" y="16" width="308" height="170" rx="14" fill="url(#file-grad)"/>

  <text x="170" y="37" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8" font-weight="700" letter-spacing="2.5"
        fill="rgba(255,255,255,0.32)">DATAMORPHED FILE</text>

  <!-- Band: Base Carrier -->
  <rect x="28" y="46" width="284" height="38" rx="8"
        fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="170" y="62" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.88)">Base Carrier</text>
  <text x="170" y="78" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8.5" fill="rgba(255,255,255,0.45)">the visible file, unchanged</text>

  <!-- Band: Public Manifest -->
  <rect x="28" y="92" width="284" height="38" rx="8"
        fill="rgba(11,87,208,0.28)" stroke="rgba(11,87,208,0.45)" stroke-width="1"/>
  <text x="170" y="108" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="10.5" font-weight="700" fill="#93c5fd">Public Manifest</text>
  <text x="170" y="124" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8.5" fill="rgba(147,197,253,0.65)">openly declares hidden states</text>

  <!-- Band: Concealed Payload -->
  <rect x="28" y="138" width="284" height="38" rx="8"
        fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.1)" stroke-width="1"
        stroke-dasharray="5 3"/>
  <text x="156" y="154" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.52)">Concealed Payload</text>
  <text x="156" y="170" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8.5" fill="rgba(255,255,255,0.28)">encrypted · locked</text>
  <!-- lock icon -->
  <path d="M298,148 a7,7 0 0,1 14,0 l0,4 a3,3 0 0,1 -3,3 l-8,0 a3,3 0 0,1 -3,-3 Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="297" y="152" width="16" height="12" rx="3"
        fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="305" cy="158" r="2" fill="rgba(255,255,255,0.45)"/>

  <!-- ── PLUS SIGN ───────────────────────────────── -->
  <text x="346" y="108" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="28" fill="#94a3b8">+</text>

  <!-- ── BLOCK 2: Reconstruction Object ─────────── -->
  <rect x="368" y="16" width="200" height="170" rx="14"
        fill="#ffffff" stroke="#d6dbe3" stroke-width="1.5"/>
  <rect x="368" y="16" width="7" height="170" rx="3.5" fill="#0b57d0"/>

  <text x="470" y="70" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="11" font-weight="700" letter-spacing="0.3"
        fill="#0f172a">Reconstruction</text>
  <text x="470" y="88" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="11" font-weight="700" letter-spacing="0.3"
        fill="#0f172a">Object</text>
  <text x="470" y="112" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#64748b">state-specific</text>
  <text x="470" y="128" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#64748b">held separately</text>
  <!-- key icon -->
  <circle cx="470" cy="152" r="9" fill="none" stroke="#0b57d0" stroke-width="2"/>
  <line x1="479" y1="152" x2="492" y2="152" stroke="#0b57d0" stroke-width="2"/>
  <line x1="489" y1="152" x2="489" y2="158" stroke="#0b57d0" stroke-width="2"/>
  <line x1="485" y1="152" x2="485" y2="156" stroke="#0b57d0" stroke-width="2"/>

  <!-- ── ARROW ─────────────────────────────────── -->
  <line x1="577" y1="101" x2="612" y2="101"
        stroke="#0b57d0" stroke-width="2.5"/>
  <polygon points="609,95 622,101 609,107" fill="#0b57d0"/>

  <!-- ── BLOCK 3: Hidden State ──────────────────── -->
  <rect x="632" y="16" width="212" height="170" rx="14"
        fill="#dbeafe" stroke="#0b57d0" stroke-width="1.5"/>

  <text x="738" y="80" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="12" font-weight="700" letter-spacing="0.3"
        fill="#083b8a">Hidden State</text>
  <text x="738" y="100" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="10" fill="#1e40af">reconstructed</text>
  <!-- unlocked padlock icon -->
  <path d="M729,128 a9,9 0 0,1 18,0" fill="none" stroke="#0b57d0" stroke-width="2"
        stroke-dasharray="28 0" stroke-linecap="round"
        transform="translate(8,-6) rotate(-30,738,126)"/>
  <rect x="729" y="132" width="18" height="14" rx="3"
        fill="#93c5fd" stroke="#0b57d0" stroke-width="1.5"/>
  <circle cx="738" cy="139" r="2.5" fill="#0b57d0"/>
  <text x="738" y="165" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8" fill="#3b82f6">integrity verified</text>

  <!-- ── MORPHOSTORAGE footer ───────────────────── -->
  <rect x="16" y="197" width="828" height="1" fill="#e2e8f0"/>
  <text x="430" y="208" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8.5" fill="#94a3b8"
        letter-spacing="0.5">MorphoStorage — optional infrastructure for hosting Reconstruction Objects</text>

</svg>
